[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
markers =
    unit: Unit tests (fast, no dependencies)
    integration: Integration tests (slower, requires DB/API)
    e2e: End-to-end tests (slowest, production simulation)
    critical: Critical path tests (must pass before merge)
    requires_real_api: Tests that require real external API keys
    slow: Slow tests (may timeout in CI)
