name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e '.[dev]'

      - name: Ruff
        run: python -m ruff check dreamfi/ tests/

      - name: Mypy (strict)
        run: python -m mypy --strict dreamfi

      - name: Pytest
        run: python -m pytest -q -m "not live_onyx"
