name: CI - DreamFi TDD Build

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================================
  # SCHEMA LAYER TESTS (Foundation - must pass first)
  # =========================================================================

  schema-tests:
    name: Schema Validation Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: dreamfi_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest psycopg2-binary

      - name: Apply schema
        run: |
          psql -h localhost -U test -d dreamfi_test -f services/knowledge-hub/db/schema.sql
        env:
          PGPASSWORD: test

      - name: Run schema tests
        run: pytest tests/unit/schema/ -v --tb=short
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/dreamfi_test

  # =========================================================================
  # CONNECTOR LAYER TESTS
  # =========================================================================

  connector-unit-tests:
    name: Connector Unit Tests
    runs-on: ubuntu-latest
    needs: schema-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-asyncio

      - name: Run connector unit tests
        run: pytest tests/unit/connectors/ -v --tb=short

  connector-integration-tests:
    name: Connector Integration Tests
    runs-on: ubuntu-latest
    needs: connector-unit-tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: dreamfi_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest psycopg2-binary

      - name: Apply schema
        run: |
          psql -h localhost -U test -d dreamfi_test -f services/knowledge-hub/db/schema.sql
        env:
          PGPASSWORD: test

      - name: Run connector integration tests
        run: pytest tests/integration/connectors/ -v --tb=short -m "not requires_real_api"
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/dreamfi_test

  # =========================================================================
  # KNOWLEDGE LAYER TESTS
  # =========================================================================

  knowledge-api-tests:
    name: Knowledge Hub Query API Tests
    runs-on: ubuntu-latest
    needs: connector-integration-tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: dreamfi_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Python dependencies
        run: |
          pip install -e .
          pip install pytest psycopg2-binary

      - name: Install Node dependencies
        run: npm install

      - name: Apply schema
        run: |
          psql -h localhost -U test -d dreamfi_test -f services/knowledge-hub/db/schema.sql
        env:
          PGPASSWORD: test

      - name: Run knowledge API tests
        run: pytest tests/unit/knowledge/ tests/integration/api/ -v --tb=short
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/dreamfi_test

  # =========================================================================
  # SKILL LAYER TESTS (Tier 1 Skills)
  # =========================================================================

  skill-eval-tests:
    name: Skill Evaluation Tests
    runs-on: ubuntu-latest
    needs: knowledge-api-tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: dreamfi_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest psycopg2-binary

      - name: Apply schema
        run: |
          psql -h localhost -U test -d dreamfi_test -f services/knowledge-hub/db/schema.sql
        env:
          PGPASSWORD: test

      - name: Run skill eval tests
        run: pytest tests/unit/generators/ tests/integration/evals/ -v --tb=short
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/dreamfi_test

  # =========================================================================
  # PUBLISH LAYER TESTS
  # =========================================================================

  publish-guard-tests:
    name: Publish Guard Tests
    runs-on: ubuntu-latest
    needs: skill-eval-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest

      - name: Run publish guard tests
        run: pytest tests/unit/publish/ -v --tb=short

  # =========================================================================
  # PLANNING LAYER TESTS
  # =========================================================================

  planning-report-tests:
    name: Planning & Reports Tests
    runs-on: ubuntu-latest
    needs: publish-guard-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest

      - name: Run planning tests
        run: pytest tests/unit/planning/ -v --tb=short

  # =========================================================================
  # METRICS LAYER TESTS
  # =========================================================================

  metrics-trust-tests:
    name: Metrics Trust Tests
    runs-on: ubuntu-latest
    needs: planning-report-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest

      - name: Run metrics tests
        run: pytest tests/unit/metrics/ -v --tb=short

  # =========================================================================
  # RESULTS ANALYZER TESTS
  # =========================================================================

  results-analyzer-tests:
    name: Results Analyzer Tests
    runs-on: ubuntu-latest
    needs: metrics-trust-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest

      - name: Run results analyzer tests
        run: pytest tests/unit/results/ -v --tb=short

  # =========================================================================
  # LINTING AND TYPE CHECKING
  # =========================================================================

  typescript-lint:
    name: TypeScript Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Apply schema fixes for linting
        run: echo "TypeScript linting would run here"

  # =========================================================================
  # MERGE GATE - All critical tests must pass
  # =========================================================================

  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    needs:
      - schema-tests
      - connector-unit-tests
      - connector-integration-tests
      - knowledge-api-tests
      - skill-eval-tests
      - publish-guard-tests
      - planning-report-tests
      - metrics-trust-tests
      - results-analyzer-tests
      - typescript-lint
    if: always()

    steps:
      - name: Check all tests passed
        run: |
          if [ "${{ needs.schema-tests.result }}" != "success" ]; then
            echo "ERROR: Schema tests failed - cannot merge"
            exit 1
          fi
          if [ "${{ needs.connector-unit-tests.result }}" != "success" ]; then
            echo "ERROR: Connector unit tests failed - cannot merge"
            exit 1
          fi
          if [ "${{ needs.connector-integration-tests.result }}" != "success" ]; then
            echo "ERROR: Connector integration tests failed - cannot merge"
            exit 1
          fi
          if [ "${{ needs.knowledge-api-tests.result }}" != "success" ]; then
            echo "ERROR: Knowledge API tests failed - cannot merge"
            exit 1
          fi
          if [ "${{ needs.skill-eval-tests.result }}" != "success" ]; then
            echo "ERROR: Skill eval tests failed - cannot merge (blocks Tier 1 skill merge)"
            exit 1
          fi
          if [ "${{ needs.publish-guard-tests.result }}" != "success" ]; then
            echo "ERROR: Publish guard tests failed - cannot merge (hard gates not enforced)"
            exit 1
          fi
          if [ "${{ needs.planning-report-tests.result }}" != "success" ]; then
            echo "ERROR: Planning tests failed - cannot merge"
            exit 1
          fi
          if [ "${{ needs.metrics-trust-tests.result }}" != "success" ]; then
            echo "ERROR: Metrics tests failed - cannot merge"
            exit 1
          fi
          if [ "${{ needs.results-analyzer-tests.result }}" != "success" ]; then
            echo "ERROR: Results analyzer tests failed - cannot merge"
            exit 1
          fi
          if [ "${{ needs.typescript-lint.result }}" != "success" ]; then
            echo "ERROR: TypeScript linting failed - cannot merge"
            exit 1
          fi
          echo "All critical tests passed - merge allowed"
