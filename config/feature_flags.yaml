# Feature Flags Configuration

# Format: flag_name: { enabled: bool, description: string }

# CONNECTOR TOGGLES
connectors:
  jira:
    enabled: true
    description: "Enable Jira data ingestion"
  dragonboat:
    enabled: true
    description: "Enable Dragonboat sync"
  confluence:
    enabled: true
    description: "Enable Confluence document indexing"
  lucidchart:
    enabled: false
    description: "Enable Lucidchart diagram ingestion (Phase 2+)"
  metabase:
    enabled: false
    description: "Enable Metabase dashboard discovery"
  posthog:
    enabled: false
    description: "Enable PostHog analytics ingestion"
  google_analytics:
    enabled: false
    description: "Enable Google Analytics import"
  klaviyo:
    enabled: false
    description: "Enable Klaviyo campaign data"
  ledger_netxd:
    enabled: false
    description: "Enable NetXD ledger sync"
  sardine:
    enabled: false
    description: "Enable Sardine risk data"
  socure:
    enabled: false
    description: "Enable Socure verification data"

# EVALUATION TOGGLES
evaluation:
  dry_run_mode:
    enabled: false
    description: "Run evals without writing results (test mode)"
  publish_gate:
    enabled: true
    description: "Require manual approval before publishing evaluations"
  auto_fail_on_regression:
    enabled: true
    description: "Auto-reject evals with score regression vs. previous version"
  allow_revert:
    enabled: false
    description: "Allow rolling back to previous eval versions (unsafe, Phase 3+)"

# SYNC TOGGLES
sync:
  watermark_tracking:
    enabled: true
    description: "Track sync watermarks for incremental updates (MUST be true)"
  dead_lettering:
    enabled: true
    description: "Capture malformed payloads to dead-letter queue"
  retry_failed_objects:
    enabled: true
    description: "Retry failed objects on next sync cycle"
  parallel_imports:
    enabled: false
    description: "Import from multiple connectors in parallel (Phase 2+ perf optimization)"

# PUBLISH TOGGLES
publishing:
  confirmation_required:
    enabled: true
    description: "Require manual confirmation before publishing to production"
  rate_limiting:
    enabled: true
    description: "Rate limit publishes to prevent API quota exhaustion"
  batch_publish:
    enabled: false
    description: "Batch publish multiple skills together (Phase 2+ performance)"

# DEBUG TOGGLES
debug:
  verbose_logging:
    enabled: false
    description: "Enable detailed logging throughout system"
  trace_all_queries:
    enabled: false
    description: "Log all database queries (high overhead, debugging only)"
  mock_external_apis:
    enabled: false
    description: "Use mock responses instead of real API calls (testing mode)"
  expose_metrics:
    enabled: true
    description: "Expose Prometheus /metrics endpoint (MUST be true for observability)"
