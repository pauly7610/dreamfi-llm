templates:
  technical_prd:
    id: technical_prd
    name: Technical PRD
    description: Product requirements document with system design, API changes, and data model details
    required_fields:
      - title
      - problem_statement
      - proposed_approach
      - target_users
      - success_metrics
    required_sections:
      - Problem Statement
      - Proposed Approach
      - System Components
      - API Changes
      - Data Model Changes
      - Edge Cases
      - Success Metrics
      - Risks
    section_order:
      - Problem Statement
      - Hypothesis
      - Proposed Approach
      - System Components
      - API Changes
      - Data Model Changes
      - Edge Cases
      - Success Metrics
      - Dependencies
      - Risks
    voice_guide: |
      Write with clarity and directness. Lead with the problem, not the solution.
      Use active voice. Include specific system components in a table.
      Define all technical terms. Keep sentences under 20 words.
      Quantify all metrics and estimates.
    system_instructions: |
      You are writing a technical PRD for an internal product team.
      Focus on implementation details and technical constraints.
      Include specific API endpoints and data model changes.
      Be precise about success metrics and how they'll be measured.
      Address edge cases explicitly.
    user_prompt_template: |
      Title: {title}
      Problem Statement: {problem_statement}
      Proposed Approach: {proposed_approach}
      Target Users: {target_users}
      Success Metrics: {success_metrics}
      Technical Constraints: {technical_constraints}
      Data Model Changes: {data_model_changes}
      API Changes: {api_changes}

      Generate a comprehensive Technical PRD with all required sections.
    sections:
      Problem Statement:
        template: "## Problem Statement"
        prompt_hint: "What problem are we solving?"
        required: true
        word_count_target: 150
      Hypothesis:
        template: "## Hypothesis"
        prompt_hint: "What do we believe to be true?"
        required: true
        word_count_target: 100
      Proposed Approach:
        template: "## Proposed Approach"
        prompt_hint: "How will we solve this?"
        required: true
        word_count_target: 200
      System Components:
        template: "## System Components"
        prompt_hint: "What systems are involved?"
        required: true
        word_count_target: 250
      API Changes:
        template: "## API Changes"
        prompt_hint: "What API endpoints are new or modified?"
        required: true
        word_count_target: 200
      Data Model Changes:
        template: "## Data Model Changes"
        prompt_hint: "What database schema changes are needed?"
        required: true
        word_count_target: 200
      Edge Cases:
        template: "## Edge Cases"
        prompt_hint: "What could go wrong?"
        required: true
        word_count_target: 150
      Success Metrics:
        template: "## Success Metrics"
        prompt_hint: "How will we measure success?"
        required: true
        word_count_target: 150
      Dependencies:
        template: "## Dependencies"
        prompt_hint: "What must be completed first?"
        required: false
        word_count_target: 100
      Risks:
        template: "## Risks"
        prompt_hint: "What risks should we monitor?"
        required: true
        word_count_target: 150

  business_prd:
    id: business_prd
    name: Business PRD
    description: Business-focused PRD with market context, revenue projections, and stakeholder alignment
    required_fields:
      - title
      - business_context
      - market_opportunity
      - target_users
      - revenue_impact_description
      - proposed_solution
      - success_metrics
      - key_stakeholders
      - timeline_estimate_weeks
    required_sections:
      - Hypothesis
      - Business Context
      - Market Opportunity
      - Target Users
      - Proposed Solution
      - Success Metrics
      - Stakeholders
      - Timeline
      - Risks
    section_order:
      - Hypothesis
      - Business Context
      - Market Opportunity
      - Target Users
      - Revenue Impact
      - Proposed Solution
      - Success Metrics
      - Stakeholders
      - Timeline
      - Risks
    voice_guide: |
      Write for business leaders and stakeholders.
      Lead with market opportunity. Use metrics and financial impact.
      Be concise but complete. Avoid technical jargon.
      Include clear revenue projections and ROI calculations.
    system_instructions: |
      You are writing a business PRD for executives and stakeholders.
      Focus on market opportunity, revenue impact, and strategic fit.
      Include a stakeholder RACI matrix.
      Provide clear timeline and resource estimates.
      Quantify all business benefits.
    user_prompt_template: |
      Title: {title}
      Business Context: {business_context}
      Market Opportunity: {market_opportunity}
      Target Users: {target_users}
      Revenue Impact: {revenue_impact_description}
      Proposed Solution: {proposed_solution}
      Success Metrics: {success_metrics}
      Key Stakeholders: {key_stakeholders}
      Timeline (weeks): {timeline_estimate_weeks}
      Risk Areas: {risk_areas}

      Generate a comprehensive Business PRD with all required sections.
    sections:
      Hypothesis:
        template: "## Hypothesis"
        prompt_hint: "What's our core hypothesis?"
        required: true
        word_count_target: 100
      Business Context:
        template: "## Business Context"
        prompt_hint: "What's the market situation?"
        required: true
        word_count_target: 200
      Market Opportunity:
        template: "## Market Opportunity"
        prompt_hint: "What's the opportunity size?"
        required: true
        word_count_target: 250
      Target Users:
        template: "## Target Users"
        prompt_hint: "Who benefits most?"
        required: true
        word_count_target: 150
      Revenue Impact:
        template: "## Revenue Impact"
        prompt_hint: "What's the financial upside?"
        required: true
        word_count_target: 200
      Proposed Solution:
        template: "## Proposed Solution"
        prompt_hint: "What's our approach?"
        required: true
        word_count_target: 200
      Success Metrics:
        template: "## Success Metrics"
        prompt_hint: "How do we measure success?"
        required: true
        word_count_target: 150
      Stakeholders:
        template: "## Stakeholders"
        prompt_hint: "Who's involved?"
        required: true
        word_count_target: 100
      Timeline:
        template: "## Timeline"
        prompt_hint: "What's the schedule?"
        required: true
        word_count_target: 100
      Risks:
        template: "## Risks"
        prompt_hint: "What could prevent success?"
        required: true
        word_count_target: 150

  risk_assessment:
    id: risk_assessment
    name: Risk Assessment
    description: Risk assessment document for third-party vendor integrations and compliance review
    required_fields:
      - vendor_name
      - service_type
      - data_categories
      - regulatory_frameworks
      - security_requirements
      - integration_approach
      - data_retention_days
      - exit_strategy_description
    required_sections:
      - Vendor Overview
      - Service Type & Data Categories
      - Regulatory Frameworks
      - Security Controls
      - Risk Assessment
      - Monitoring Approach
      - Data Retention
      - Exit Strategy
    section_order:
      - Vendor Overview
      - Service Type & Data Categories
      - Regulatory Frameworks
      - Security Controls
      - Risk Assessment
      - Monitoring Approach
      - Data Retention
      - Exit Strategy
    voice_guide: |
      Write for compliance and risk teams.
      Be precise and detailed. Avoid ambiguity.
      Include specific security controls and monitoring approaches.
      Quantify data volumes and retention periods.
    system_instructions: |
      You are writing a risk assessment for third-party vendors.
      Focus on data security, regulatory compliance, and exit strategies.
      Include a risk matrix with severity and likelihood ratings.
      List specific compliance requirements by framework.
      Detail monitoring and audit approaches.
    user_prompt_template: |
      Vendor: {vendor_name}
      Service Type: {service_type}
      Data Categories: {data_categories}
      Regulatory Frameworks: {regulatory_frameworks}
      Security Requirements: {security_requirements}
      Integration Approach: {integration_approach}
      Data Retention (days): {data_retention_days}
      Exit Strategy: {exit_strategy_description}
      Monitoring Approach: {monitoring_approach}

      Generate a comprehensive Risk Assessment with all required sections.
    sections:
      Vendor Overview:
        template: "## Vendor Overview"
        prompt_hint: "Vendor information and history"
        required: true
        word_count_target: 150
      Service Type & Data Categories:
        template: "## Service Type & Data Categories"
        prompt_hint: "What service and what data?"
        required: true
        word_count_target: 200
      Regulatory Frameworks:
        template: "## Regulatory Frameworks"
        prompt_hint: "What regulations apply?"
        required: true
        word_count_target: 200
      Security Controls:
        template: "## Security Controls"
        prompt_hint: "What controls are in place?"
        required: true
        word_count_target: 250
      Risk Assessment:
        template: "## Risk Assessment"
        prompt_hint: "What are the key risks?"
        required: true
        word_count_target: 300
      Monitoring Approach:
        template: "## Monitoring Approach"
        prompt_hint: "How will we monitor?"
        required: true
        word_count_target: 150
      Data Retention:
        template: "## Data Retention"
        prompt_hint: "How long is data kept?"
        required: true
        word_count_target: 100
      Exit Strategy:
        template: "## Exit Strategy"
        prompt_hint: "How do we exit?"
        required: true
        word_count_target: 150

