sync_schedule:
  dragonboat_to_jira:
    frequency_minutes: 5
    batch_size: 10
    retry_on_conflict: true
  jira_to_dragonboat:
    frequency_minutes: 10
    batch_size: 10
    retry_on_conflict: true
  reconciliation:
    frequency_minutes: 60
    check_window_hours: 24

sla_definitions:
  standard:
    initiative_duration_days: 30
    escalation_threshold_days: 25
  critical:
    initiative_duration_days: 14
    escalation_threshold_days: 12
  experimental:
    initiative_duration_days: 60
    escalation_threshold_days: 50

alert_thresholds:
  blocked_initiative:
    days_threshold: 5
    severity: critical
  no_progress:
    days_threshold: 10
    severity: medium
  dependency_cycle:
    severity: critical
  velocity_drop:
    percent_threshold: 10
    severity: high
  capacity_overflow:
    backlog_growth_percent: 50
    severity: high

metrics_thresholds:
  velocity:
    drop_threshold_percent: 10
    raise_alert: true
  cycle_time:
    increase_threshold_percent: 25
    raise_alert: true
  quality:
    bug_escape_rate_threshold: 5
    defect_density_threshold: 0.2
    raise_alert: true
  on_schedule_rate:
    minimum_percent: 70
    raise_alert: true

slack_channel_mappings:
  alerts_critical: "#dreamfi-critical-alerts"
  alerts_high: "#dreamfi-alerts"
  alerts_medium: "#dreamfi-notifications"
  weekly_report: "#dreamfi-reporting"
  monthly_report: "#dreamfi-monthly"
  dependency_changes: "#dreamfi-architecture"

cache_settings:
  dashboard_ttl_minutes: 30
  metrics_ttl_minutes: 30
  alerts_ttl_minutes: 5
  reports_ttl_minutes: 60

report_settings:
  weekly:
    send_day: monday
    send_time: "09:00"
    include_metrics: true
    include_blockers: true
  monthly:
    send_day: 1
    send_time: "10:00"
    include_velocity: true
    include_quality: true
    include_health_breakdown: true
  dependency:
    frequency_days: 1
    include_cycles: true
    include_high_risk: true
    include_blocked: true

notification_settings:
  send_to_slack: true
  send_to_email: false
  email_recipients:
    - engineering-leads@dreamfi.com
  slack_retries: 3
  slack_retry_delay_seconds: 5

health_score_weights:
  velocity_score: 0.25
  cycle_time_score: 0.25
  quality_score: 0.25
  schedule_score: 0.25

quality_metrics:
  track_bug_escape: true
  track_defect_density: true
  track_test_coverage: false
  track_performance: false

initiative_status_mapping:
  dragonboat_to_jira:
    "planning": "Backlog"
    "active": "In Progress"
    "on_hold": "On Hold"
    "completed": "Done"
    "cancelled": "Cancelled"
    "at_risk": "At Risk"
  jira_to_dragonboat:
    "Backlog": "planning"
    "To Do": "planning"
    "In Progress": "active"
    "In Review": "active"
    "On Hold": "on_hold"
    "Done": "completed"
    "Cancelled": "cancelled"
