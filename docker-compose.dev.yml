version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dreamfi-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dreamfi_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_password}
      POSTGRES_DB: ${POSTGRES_DB:-dreamfi_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/knowledge_hub/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./services/knowledge_hub/db/migrations/001_initial.sql:/docker-entrypoint-initdb.d/02-migrations.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dreamfi_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dreamfi-network

  redis:
    image: redis:7-alpine
    container_name: dreamfi-redis-dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dreamfi-network

  # Optional: Prometheus for metrics (Phase 0 observability)
  prometheus:
    image: prom/prometheus:latest
    container_name: dreamfi-prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ./services/shared/alerts/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dreamfi-network

volumes:
  postgres_data:
  prometheus_data:

networks:
  dreamfi-network:
    driver: bridge
